name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - uses: extractions/setup-just@v2

      - name: Run unit tests
        run: just test

      - name: Build WASM plugin
        run: just plugin-wasm && mv examples/plugin.wasm sqlc-gen-typescript.wasm

      - name: Calculate SHA256
        id: sha256
        run: |
          SHA256=$(sha256sum sqlc-gen-typescript.wasm | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: sqlc-gen-typescript.wasm
          body: |
            ## sqlc-gen-typescript WASM Plugin

            **SHA256:** `${{ steps.sha256.outputs.sha256 }}`

            ### Usage

            Add this to your `sqlc.yaml`:

            ```yaml
            plugins:
              - name: ts
                wasm:
                  url: https://github.com/tylergannon/sqlc-gen-typescript/releases/download/${{ github.ref_name }}/sqlc-gen-typescript.wasm
                  sha256: ${{ steps.sha256.outputs.sha256 }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
